<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script>try{if(localStorage.getItem('theme')==='dark'||(!localStorage.getItem('theme')&&matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark')}catch(e){}</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{ab:{DEFAULT:'#0066cc',focus:'#0071e3',dk:'#2997ff'},ink:'#1d1d1f',parch:'#f5f5f7',tile:'#272729',hair:'#e0e0e0',mut:'#6e6e73',mutd:'#86868b'},fontFamily:{sf:['SF Pro Display','SF Pro Text','-apple-system','BlinkMacSystemFont','Pretendard','system-ui','sans-serif']}}}}</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="assets/style.css" />
<script src="common.js" defer></script>
</head>
<body data-page="playground" class="bg-white font-sf text-ink antialiased transition-colors dark:bg-black dark:text-[#f5f5f7]">
<div id="progress" class="fixed left-0 top-0 z-[80] h-[2px] w-0 bg-ab dark:bg-ab-dk"></div>
<header class="sticky top-0 z-50 bg-black/90 backdrop-blur-md">
  <nav class="mx-auto flex h-12 max-w-[1024px] items-center justify-between px-4" aria-label="주 메뉴">
    <a href="index.html" id="brand" class="text-[13px] font-semibold tracking-[0.22em] text-white">SUNJAE LEE<span id="brand-star" class="ml-1.5 hidden text-ab-dk" aria-hidden="true">★</span></a>
    <ul class="hidden items-center gap-9 md:flex">
      <li><a href="index.html" data-page="home" data-i18n="nav.home" class="text-[13px] tracking-[-0.1px] transition"></a></li>
      <li><a href="projects.html" data-page="projects" data-i18n="nav.projects" class="text-[13px] tracking-[-0.1px] transition"></a></li>
      <li><a href="about.html" data-page="about" data-i18n="nav.about" class="text-[13px] tracking-[-0.1px] transition"></a></li>
      <li><a href="playground.html" data-page="playground" data-i18n="nav.playground" class="text-[13px] tracking-[-0.1px] transition"></a></li>
    </ul>
    <div class="flex items-center gap-2">
      <button id="lang-toggle" class="h-8 rounded-full bg-white/10 px-3 text-[12px] font-semibold text-white transition hover:bg-white/20 active:scale-95" aria-label="언어 전환">EN</button>
      <button id="theme-toggle" class="h-8 w-8 rounded-full bg-white/10 text-[14px] text-white transition hover:bg-white/20 active:scale-95" aria-label="테마 전환">☾</button>
      <button id="nav-toggle" class="h-8 w-8 rounded-full bg-white/10 text-[14px] text-white transition hover:bg-white/20 active:scale-95 md:hidden" aria-label="메뉴 열기" aria-expanded="false">☰</button>
    </div>
  </nav>
  <div id="mobile-menu" class="hidden border-t border-white/10 bg-black px-4 pb-3 md:hidden">
    <a href="index.html" data-page="home" data-i18n="nav.home" class="block py-3 text-[15px]"></a>
    <a href="projects.html" data-page="projects" data-i18n="nav.projects" class="block py-3 text-[15px]"></a>
    <a href="about.html" data-page="about" data-i18n="nav.about" class="block py-3 text-[15px]"></a>
    <a href="playground.html" data-page="playground" data-i18n="nav.playground" class="block py-3 text-[15px]"></a>
  </div>
</header>
<main>
  <section class="px-4 pb-14 pt-16 text-center sm:pt-20">
    <h1 data-i18n="pg.h1" class="reveal text-[34px] font-semibold leading-[1.07] tracking-[-0.28px] sm:text-[48px]"></h1>
    <p data-i18n="pg.lead" class="reveal mx-auto mt-4 max-w-[560px] text-[19px] font-light leading-[1.45] tracking-[0.1px] text-mut dark:text-mutd sm:text-[21px]"></p>
  </section>

  <!-- reaction game -->
  <section class="px-4 pb-16">
    <div class="mx-auto max-w-[760px]">
      <p class="reveal text-[12px] font-semibold uppercase tracking-[0.18em] text-ab dark:text-ab-dk">Mini Game</p>
      <h2 data-i18n="game.sub" class="reveal mt-2 text-[32px] font-semibold leading-[1.12] tracking-[-0.374px] sm:text-[40px]"></h2>
      <p data-i18n="game.desc" class="reveal mt-4 max-w-[560px] text-[16px] leading-[1.47] text-mut dark:text-mutd"></p>
      <div id="game-pad" role="button" tabindex="0" aria-label="반응속도 테스트 시작" class="reveal mt-8 flex min-h-[280px] cursor-pointer select-none flex-col items-center justify-center gap-3 rounded-[18px] p-8 text-center text-white transition-colors duration-100" style="background:#0066cc">
        <p id="game-msg" class="text-[32px] font-semibold tracking-[-0.4px]"></p>
        <p id="game-sub" class="max-w-[420px] text-[15px] leading-[1.5] text-white/85"></p>
        <p id="game-best" class="mt-1 text-[13px] font-mono text-white/70"></p>
      </div>
    </div>
  </section>

  <!-- guestbook -->
  <section class="bg-parch px-4 py-20 dark:bg-[#161617]">
    <div class="mx-auto max-w-[760px]">
      <p class="reveal text-[12px] font-semibold uppercase tracking-[0.18em] text-ab dark:text-ab-dk">Guestbook</p>
      <h2 data-i18n="gb.title" class="reveal mt-2 text-[32px] font-semibold leading-[1.12] tracking-[-0.374px] sm:text-[40px]"></h2>
      <p data-i18n="gb.lead" class="reveal mt-3 text-[16px] text-mut dark:text-mutd"></p>
      <div class="reveal mt-8 flex flex-col gap-3 sm:flex-row">
        <input id="gb-name" type="text" maxlength="20" data-i18n-ph="gb.ph.name" class="h-11 rounded-full border border-hair bg-white px-5 text-[15px] outline-none transition focus:border-ab dark:border-white/15 dark:bg-black dark:focus:border-ab-dk sm:w-40" />
        <input id="gb-msg" type="text" maxlength="200" data-i18n-ph="gb.ph.msg" class="h-11 flex-1 rounded-full border border-hair bg-white px-5 text-[15px] outline-none transition focus:border-ab dark:border-white/15 dark:bg-black dark:focus:border-ab-dk" />
        <button id="gb-submit" data-i18n="gb.submit" class="h-11 shrink-0 rounded-full bg-ab px-7 text-[15px] text-white transition hover:bg-ab-focus active:scale-95"></button>
      </div>
      <p data-i18n="gb.note" class="mt-3 text-[12px] text-mut/80 dark:text-mutd/80"></p>
      <ul id="gb-list" class="mt-6 space-y-3"></ul>
    </div>
  </section>
</main>
<footer class="border-t border-hair bg-parch dark:border-white/10 dark:bg-[#161617]">
  <div class="mx-auto max-w-[1024px] px-4 py-12">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <span data-i18n="ft.rights" class="text-[12px] tracking-[-0.12px] text-mut dark:text-mutd"></span>
      <div class="flex gap-5 text-[12px]">
        <a href="mailto:leeseonjae0111@gmail.com" class="text-mut transition hover:text-ab dark:text-mutd dark:hover:text-ab-dk">Email</a>
        <a href="https://github.com/Vongole25" target="_blank" rel="noopener" class="text-mut transition hover:text-ab dark:text-mutd dark:hover:text-ab-dk">GitHub</a>
        <a href="https://it-study-2002.tistory.com/" target="_blank" rel="noopener" class="text-mut transition hover:text-ab dark:text-mutd dark:hover:text-ab-dk">Blog</a>
      </div>
    </div>
    <p data-i18n="ft.built" class="mt-2 text-[12px] tracking-[-0.12px] text-mut/70 dark:text-mutd/70"></p>
  </div>
</footer>
</body>
</html>
